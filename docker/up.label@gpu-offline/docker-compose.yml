

services:
  labelstudio:
    image: heartexlabs/label-studio
    environment:
      - LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK=true
      - LABEL_STUDIO_USERNAME=label@localhost
      - LABEL_STUDIO_PASSWORD=label.123
      - LABEL_STUDIO_USER_TOKEN=label-token
    ports:
      - "8080:8080"
    container_name: label-studio

  audioseal_label:
    image: xiaoyao9184/audio-seal:0.1.4
    container_name: audioseal-label
    working_dir: /workspace/label
    command: label-studio-ml start --root-dir /workspace label
    environment:
      - LABEL_STUDIO_API_KEY=label-token
      - HF_HUB_OFFLINE=true
    ports:
      - "9090:9090"
    volumes:
      - ./../../cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [ gpu ]
