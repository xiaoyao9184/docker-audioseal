
name: HuggingFace Space Sync

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  push-hf-space:
    name: Push source code to HuggingFace
    runs-on: ubuntu-latest

    steps:
      - name: Sync to HuggingFace
        uses: xiaoyao9184/huggingface-sync-action@3d79db537a90f9b057ed1f4ab0ee7119b4c15259
        with:
          github_repo_id: 'xiaoyao9184/docker-audioseal'
          huggingface_repo_id: '${{ secrets.HF_USERNAME }}/audio-seal'
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: 'space'
          private: false
          space_sdk: 'gradio'
          subdirectory: 'gradio'
