name: audio_seal
channels:
  - pytorch
  - nvidia
dependencies:
  - python=3.10

  - pytorch::pytorch==2.5.1
  - pytorch::pytorch-cuda==12.4
  - pytorch::torchvision==0.20.1
  # conda-forge miss cuda_124 https://anaconda.org/conda-forge/torchaudio/files?version=2.5.1&sort=basename&sort_order=desc
  - pytorch::torchaudio==2.5.1

  # - ffmpeg==4.3

  - pip:
    - torch==2.5.1
    - jupyter==1.1.1
    - -r ./audioseal/requirements.txt
    - -e ./audioseal
    - gradio[mcp]==5.28.0
    # gradio[mcp] 5.28.0 depends on pydantic>=2.11
    - pydantic==2.11.4
    - matplotlib==3.10.0
    # for label-studio development and test
    - -r label/requirements_base.txt
    - -r label/requirements_dev.txt
    - -r label/requirements_test.txt
